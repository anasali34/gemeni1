<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سیستەمی کاشێری مۆبایل</title>
    <style>
        body { font-family: 'tahoma', sans-serif; background-color: #f0f2f5; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        
        /* شێوازی لۆگین */
        #login-section { text-align: center; }
        
        /* شێوازی کاشێر */
        #cashier-section { display: none; }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background: #218838; }
        
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        .total-box { font-size: 20px; font-weight: bold; margin-top: 20px; color: #d9534f; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-section">
        <h2>چوونەژوورەوە</h2>
        <input type="text" id="username" placeholder="ناوی بەکارهێنەر">
        <input type="password" id="password" placeholder="وشەی نهێنی">
        <button onclick="checkLogin()">چوونەژوورەوە</button>
        <p id="error" style="color:red;"></p>
    </div>

    <div id="cashier-section">
        <h2>فرۆشتنی مۆبایل</h2>
        <input type="text" id="itemName" placeholder="ناوی مۆبایل">
        <input type="number" id="itemPrice" placeholder="نرخ ($)">
        <button onclick="addItem()">زیادکردن</button>
        
        <table>
            <thead><tr><th>ناو</th><th>نرخ</th></tr></thead>
            <tbody id="cartTable"></tbody>
        </table>
        
        <div class="total-box">کۆی گشتی: <span id="total">0</span>$</div>
        <br>
        <button style="background:#dc3545;" onclick="location.reload()">دەرچوون</button>
    </div>
</div>

<script>
    function checkLogin() {
        let user = document.getElementById('username').value;
        let pass = document.getElementById('password').value;
        if (user === "admin" && pass === "1234") {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('cashier-section').style.display = 'block';
        } else {
            document.getElementById('error').innerText = "ناوی بەکارهێنەر یان پاسۆرد هەڵەیە!";
        }
    }

    let total = 0;
    function addItem() {
        let name = document.getElementById('itemName').value;
        let price = parseFloat(document.getElementById('itemPrice').value);
        if(name && price) {
            let table = document.getElementById('cartTable');
            table.innerHTML += `<tr><td>${name}</td><td>${price}$</td></tr>`;
            total += price;
            document.getElementById('total').innerText = total;
            document.getElementById('itemName').value = '';
            document.getElementById('itemPrice').value = '';
        }
    }
</script>

</body>
</html>
